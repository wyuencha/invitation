<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Invitation</title>
    <link rel="preload" href="assets/cat.jpg" as="image" />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="script.js"></script>
  </head>
  <body>
    <div class="sparkle-layer" id="sparkle-layer" aria-hidden="true"></div>

    <div class="love-field" aria-hidden="true">
      <span class="heart heart-1"></span>
      <span class="heart heart-2"></span>
      <span class="heart heart-3"></span>
      <span class="heart heart-4"></span>
      <span class="heart heart-5"></span>
      <span class="heart heart-6"></span>
      <span class="heart heart-7"></span>
      <span class="heart heart-8"></span>
      <span class="heart heart-9"></span>
      <span class="heart heart-10"></span>
      <span class="star star-1"></span>
      <span class="star star-2"></span>
      <span class="star star-3"></span>
    </div>

    <main class="page-shell">
      <section class="proposal-card" id="proposal-card" aria-labelledby="invite-title">
        <div class="intro" id="question-panel">
          <p class="mood-bubble" id="mood-bubble">Dinner date?</p>
          <button
            class="mascot-card"
            id="mascot-card"
            type="button"
            aria-label="Cute bear and kitten dinner bus"
          >
            <img
              class="mascot-image"
              id="main-image"
              src="assets/cat.jpg"
              alt="Cute white cat peeking over a line"
            />
          </button>
          <h1 id="invite-title">Can I take you out for dinner?</h1>
          <p class="lead" id="lead-text">
            I have one tiny dinner invitation and one very hopeful cat.
          </p>
          <div class="choice-zone" id="choice-zone">
            <button class="primary-button" id="yes-button" type="button">
              Yes
            </button>
            <button class="secondary-button" id="no-button" type="button">
              No
            </button>
          </div>
        </div>

        <form class="details-form" id="invitation-form" hidden>
          <input type="hidden" name="response" value="Yes" />

          <div class="form-heading">
            <p class="mood-bubble">Yay, ticket confirmed</p>
            <h2>Choose our cute dinner plan</h2>
          </div>

          <div class="field-grid">
            <label class="field">
              <span>Contact number</span>
              <input
                autocomplete="tel"
                inputmode="tel"
                name="contactNumber"
                placeholder="+60 12 345 6789"
                required
                type="tel"
              />
            </label>

            <label class="field">
              <span>Preferred day</span>
              <select name="preferredDay" required>
                <option value="" selected disabled>Pick a day</option>
                <option>Friday night</option>
                <option>Saturday night</option>
                <option>Sunday evening</option>
                <option>Weekday after work</option>
                <option>Let us decide together</option>
              </select>
            </label>

            <label class="field">
              <span>Preferred time</span>
              <select name="preferredTime" required>
                <option value="" selected disabled>Pick a time</option>
                <option>6:30 PM</option>
                <option>7:00 PM</option>
                <option>7:30 PM</option>
                <option>8:00 PM</option>
                <option>Surprise me</option>
              </select>
            </label>

            <label class="field">
              <span>Cuisine mood</span>
              <select name="cuisine" required>
                <option value="" selected disabled>Pick food mood</option>
                <option>Japanese</option>
                <option>Italian</option>
                <option>Korean BBQ</option>
                <option>Steakhouse</option>
                <option>Local favorites</option>
                <option>Cafe and dessert</option>
              </select>
            </label>
          </div>

          <div class="form-actions">
            <button class="primary-button" type="submit">
              Send my dinner ticket
            </button>
            <p class="status-message" id="status-message" role="status" aria-live="polite"></p>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
